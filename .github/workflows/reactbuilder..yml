name: Compilar App Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. Instalar dependencias
        run: npm install

      - name: 4. Compilar React
        run: npm run build

      - name: 5. Configurar Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 6. Sincronizar Capacitor
        run: npx cap sync android

      - name: 7. Compilar el APK con Gradle
        # Ahora la carpeta android está directamente en la raíz
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 8. Subir el APK final
        uses: actions/upload-artifact@v4
        with:
          name: zapping-app-debug
          # La ruta de descarga también se acorta desde la raíz
          path: android/app/build/outputs/apk/debug/app-debug.apk