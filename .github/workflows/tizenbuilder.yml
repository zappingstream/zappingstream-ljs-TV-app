name: Compilar App Tizen (Samsung TV)

on:
  workflow_dispatch:

jobs:
  build-tizen:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. Instalar dependencias base
        run: npm install

      - name: 4. Compilar Lightning JS
        run: npx @lightningjs/cli build

      - name: 5. Instalar CLI oficial de Samsung Tizen
        # Usamos la herramienta oficial de Samsung empaquetada para Node
        run: npm install -g @tizen-tv/cli

      - name: 6. Inyectar config.xml (Manifiesto de Tizen)
        # Tizen necesita un archivo config.xml en la raíz de los archivos web.
        # Lo generamos al vuelo dentro de la carpeta 'build' generada por Lightning.
        run: |
          cd build
          if [ ! -f config.xml ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>
            <widget xmlns="http://www.w3.org/ns/widgets" xmlns:tizen="http://tizen.org/ns/widgets" id="http://zapping.app/ZappingApp" version="1.0.0" viewmodes="maximized">
                <tizen:application id="ZappingApp.Zapping" package="ZappingApp" required_version="2.3"/>
                <content src="index.html"/>
                <feature name="http://tizen.org/feature/screen.size.all"/>
                <icon src="icon.png"/>
                <name>Zapping</name>
            </widget>' > config.xml
          fi

      - name: 7. Empaquetar la aplicación (.wgt)
        # El CLI de Tizen toma la carpeta 'build' y la convierte en un paquete instalable
        run: tizen package -t wgt -- build

      - name: 8. Subir el Widget final
        uses: actions/upload-artifact@v4
        with:
          name: zapping-app-tizen
          path: '**/*.wgt'
